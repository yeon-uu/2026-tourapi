<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아이두 - 여행의 시작</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* -----------------------------------
     UX/UI Design System
     Theme: Sunny Yellow (밝고 경쾌한 노란색 테마)
  ----------------------------------- */
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  
  :root {
    --bg-color: #FFFCF2;
    --primary-color: #FFB703;
    --primary-light: #FFE8A1;
    --accent-color: #FB8500;
    --text-main: #3D3D3D;
    --text-muted: #8E8E8E;
    --shadow: 0 10px 30px rgba(255, 183, 3, 0.15);
  }

  body {
    font-family: 'Pretendard', sans-serif;
    background-color: #f5f5f5; 
    color: var(--text-main);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #mobile-app {
    width: 100%;
    max-width: 400px;
    height: 100vh;
    max-height: 850px;
    background-color: var(--bg-color);
    position: relative;
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }

  /* --- 화면 공통 설정 --- */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100%;
    box-sizing: border-box;
    animation: fadeIn 0.4s ease-out forwards;
  }
  
  #screen-mission { justify-content: flex-start; }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Intro Page UI (Screen 0) --- */
  .logo-wrapper { text-align: center; margin-bottom: 20px; }
  .logo-icon { font-size: 40px; margin-bottom: 10px; display: inline-block; }
  .logo-text { font-size: 28px; font-weight: 900; margin: 0; color: var(--accent-color); letter-spacing: -0.5px; }
  .main-title { font-size: 24px; font-weight: 700; margin-bottom: 50px; color: var(--text-main); }
  
  .input-group { width: 100%; margin-bottom: 20px; }
  .custom-input {
    width: 100%; padding: 18px 20px; background-color: #ffffff;
    border: 2px solid var(--primary-light); border-radius: 20px;
    font-size: 16px; font-weight: 500; font-family: 'Pretendard', sans-serif;
    color: var(--text-main); box-sizing: border-box; outline: none;
    transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
  }
  .custom-input::placeholder { color: var(--text-muted); }
  .custom-input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(255, 183, 3, 0.2); }

  select.custom-input {
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FB8500' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat; background-position: right 20px center; background-size: 20px;
    color: var(--text-muted);
  }
  select.custom-input.selected { color: var(--text-main); }

  .action-btn {
    width: 100%; padding: 18px; background-color: var(--primary-color);
    color: #fff; border: none; border-radius: 20px; font-size: 18px;
    font-weight: 800; cursor: pointer; box-shadow: var(--shadow);
    transition: transform 0.1s, background-color 0.2s; margin-top: 20px;
  }
  .action-btn:active { transform: scale(0.96); background-color: var(--accent-color); }

  /* --- 상단 내비게이션 --- */
  .top-nav { width: 100%; display: flex; justify-content: space-between; padding: 10px 0; margin-bottom: 20px; }
  .nav-icon-btn { background: none; border: none; color: var(--accent-color); font-weight: 800; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

  /* --- 카드 3D 회전 설정 --- */
  .draw-container {
    perspective: 1000px; width: 100%; flex: 1; display: flex;
    flex-direction: column; align-items: center; justify-content: center; position: relative;
  }
  .card-wrapper {
    width: 280px; max-width: 80%; height: 400px; margin: 0 auto;
    position: relative; z-index: 10;
  }
  .card {
    width: 100%; height: 100%; position: relative;
    transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d;
  }
  .card.is-flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    border-radius: 25px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 4px solid #fff;
  }
  .card-back { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); color: white; }
  .card-logo { font-size: 80px; margin-bottom: 20px; animation: float 2s infinite ease-in-out; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  .card-front { background-color: white; transform: rotateY(180deg); padding: 30px; text-align: center; border: 4px solid var(--primary-color); }
  .card-front.ssr { border-color: #FFD700; background: linear-gradient(135deg, #fff 0%, #FFF9E6 100%); }
  .card-front.ssr::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 21px; background: linear-gradient(45deg, rgba(255,215,0,0.1) 0%, transparent 50%, rgba(255,215,0,0.1) 100%);
  }

  .rank-badge { background-color: var(--accent-color); color: white; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 14px; margin-bottom: 20px; }
  .ssr .rank-badge { background: linear-gradient(to right, #FFD700, #FFA500); }
  .res-station { font-size: 32px; font-weight: 900; margin: 10px 0; color: var(--text-main); }
  .res-line { font-size: 16px; color: var(--text-muted); margin-bottom: 30px; }
  .transfer-tag { font-size: 14px; color: var(--accent-color); font-weight: 700; background-color: var(--primary-light); padding: 8px 15px; border-radius: 15px; }

  #sparkle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

  /* --- 버튼 제어 --- */
  .draw-controls, .result-actions { width: 100%; margin-top: 30px; }
  .result-actions { display: flex; gap: 10px; justify-content: center; }
  .retry-btn { background-color: var(--primary-light); color: var(--text-main); }
  .mission-btn { background-color: var(--accent-color); }

  /* --- 미션 페이지 전용 스타일 --- */
  .nav-title { font-weight: 800; font-size: 16px; color: var(--text-main); }
  .mission-card-mini {
    width: 100%; background: white; border-radius: 20px; padding: 15px;
    display: flex; flex-direction: column; align-items: center;
    border: 2px solid var(--primary-light); margin-bottom: 25px; box-sizing: border-box;
  }
  .mission-checklist { list-style: none; padding: 0; width: 100%; margin: 0; }
  .mission-item {
    display: flex; align-items: center; background: white; padding: 18px;
    border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--primary-light);
    transition: all 0.3s ease; box-sizing: border-box;
  }
  .mission-item.completed { background-color: #f0fdf4; border-color: #22c55e; }
  .mission-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--accent-color); cursor: pointer; flex-shrink: 0; }
  .mission-item label { font-size: 15px; font-weight: 600; color: var(--text-main); flex: 1; cursor: pointer; }
  .mission-item.completed label { text-decoration: line-through; color: #a4b0be; }

  .progress-bar-area { width: 100%; text-align: center; margin: 20px 0; }
  #progress-text { font-weight: 800; color: var(--accent-color); margin-bottom: 10px; }
  .progress-track { width: 100%; height: 12px; background: #eee; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(to right, var(--primary-color), var(--accent-color)); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }

  .stamp-btn { margin-bottom: 40px; opacity: 0.5; background-color: #a4b0be; border: none; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .stamp-btn.active { opacity: 1; background-color: var(--accent-color); animation: bounce 0.5s ease infinite alternate; }
  @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.03); } }

  /* --- 스탬프 획득 페이지 전용 스타일 --- */
  .stamp-header { font-size: 28px; color: var(--accent-color); margin-bottom: 25px; z-index: 10; text-shadow: 0 2px 10px rgba(251, 133, 0, 0.2); }
  
  .stamp-card {
    background: #fff; border-radius: 20px; padding: 40px 25px; width: 85%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08); position: relative; z-index: 10;
    border: 2px dashed #FFB703; text-align: center;
  }
  
  .stamp-visual {
    width: 90px; height: 90px; border-radius: 50%; border: 5px solid #E63946;
    color: #E63946; display: flex; flex-direction: column; align-items: center;
    justify-content: center; position: absolute; top: -40px; right: 20px;
    transform: rotate(15deg); background: #fff; box-shadow: 0 5px 15px rgba(230, 57, 70, 0.2);
  }
  .stamp-visual i { font-size: 35px; }
  .stamp-visual .stamp-text { font-size: 11px; font-weight: 900; letter-spacing: 2px; margin-top: 5px; }
  
  .stamp-station { font-size: 32px; font-weight: 900; color: var(--text-main); margin: 0 0 10px 0; }
  .stamp-meta { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; color: var(--text-muted); font-size: 15px; }
  
  .stamp-divider { width: 100%; height: 2px; background-image: linear-gradient(to right, #ccc 50%, transparent 50%); background-size: 10px 2px; margin: 25px 0; }
  
  .stamp-date { font-size: 22px; font-weight: 900; color: var(--text-main); letter-spacing: 3px; font-family: monospace; }
  
  .stamp-missions { text-align: left; font-size: 14px; color: #555; }
  .stamp-missions ul { list-style: none; padding: 0; margin: 0; }
  .stamp-missions li { margin-bottom: 8px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.4; }
  .stamp-missions li i { color: #22c55e; margin-top: 2px; }
  
  .stamp-author { font-size: 16px; font-weight: 800; color: var(--accent-color); text-align: right; margin-top: 10px; }
  
  #stamp-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

  /* --- 컬렉션 페이지 전용 스타일 --- */
  .collection-summary {
    background: #fff; width: 100%; padding: 25px 20px; border-radius: 20px;
    box-shadow: var(--shadow); border: 2px solid var(--primary-light);
    text-align: center; margin-bottom: 30px; box-sizing: border-box;
  }
  
  .rail-section { margin-bottom: 40px; width: 100%; }
  
  .rail-title {
    font-size: 15px; font-weight: 800; color: var(--text-main);
    display: flex; align-items: center; gap: 10px; margin-bottom: 25px;
  }
  .rail-title::before, .rail-title::after { content: ''; flex: 1; height: 2px; background: #e0e0e0; }
  
  .track-container { display: flex; justify-content: space-between; position: relative; width: 100%; padding: 0 10px; box-sizing: border-box; }
  
  .track-line {
    position: absolute; top: 18px; left: 10%; right: 10%; height: 4px;
    background: repeating-linear-gradient(90deg, #ccc, #ccc 10px, transparent 10px, transparent 15px); z-index: 1;
  }
  
  .track-node { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; width: 60px; }
  
  .node-circle {
    width: 36px; height: 36px; border-radius: 50%; background: #f5f5f5;
    border: 3px solid #ccc; display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; transition: all 0.3s; color: #ccc; font-size: 14px;
  }
  
  .node-name { font-size: 13px; font-weight: 700; color: #999; text-align: center; word-break: keep-all; }
  
  .track-node.unlocked { cursor: pointer; }
  .track-node.unlocked .node-circle {
    background: var(--primary-color); border-color: var(--accent-color);
    color: white; box-shadow: 0 4px 10px rgba(251, 133, 0, 0.3); transform: scale(1.1);
  }
  .track-node.unlocked .node-name { color: var(--text-main); }
  .track-node.unlocked:active .node-circle { transform: scale(0.95); }
</style>
</head>
<body>

<div id="mobile-app">

  <div id="screen0" class="screen active">
    <div class="logo-wrapper">
      <span class="logo-icon">🚂</span>
      <h1 class="logo-text">아이두</h1>
    </div>
    <h2 class="main-title">"어디로 떠나볼까?"</h2>
    
    <div class="input-group">
      <input type="text" id="user-nickname" class="custom-input" placeholder="닉네임 입력">
    </div>
    <div class="input-group">
      <select id="start-station" class="custom-input" onchange="this.classList.add('selected')">
        <option value="" disabled selected>출발역 선택</option>
        <option value="서울역">서울역</option>
        <option value="청량리역">청량리역</option>
      </select>
    </div>
    
    <button class="action-btn" onclick="startJourney()">시작하기</button>
  </div>

  <div id="screen-draw" class="screen">
    <nav class="top-nav">
      <button class="nav-icon-btn" onclick="location.reload()"><i class="fa-solid fa-house"></i> 아이두</button>
      <button class="nav-icon-btn" onclick="openCollection()">컬렉션 <i class="fa-solid fa-book"></i></button>
    </nav>

    <div class="draw-container">
      <div class="card-wrapper" id="card-wrapper">
        <div class="card" id="card-inner">
          <div class="card-face card-back">
            <div class="card-logo">🚂</div>
            <p>어디로 가게 될까요?</p>
          </div>
          <div class="card-face card-front" id="card-result">
            <div class="rank-badge" id="res-rank">SSR</div>
            <h2 class="res-station" id="res-name">-</h2>
            <p class="res-line" id="res-line">-</p>
            <div class="transfer-tag" id="res-transfer"><i class="fa-solid fa-train-subway"></i> 환승 필요</div>
          </div>
        </div>
      </div>
      <canvas id="sparkle-canvas"></canvas>
    </div>

    <div class="draw-controls" id="draw-controls">
      <button class="action-btn draw-main-btn" id="main-draw-btn" onclick="drawCard()">
        뽑기! <span id="draw-count-display">(5/5)</span>
      </button>
    </div>

    <div class="result-actions" id="result-actions" style="display: none;">
      <button class="action-btn retry-btn" onclick="resetCard()">다시 뽑기</button>
      <button class="action-btn mission-btn" onclick="receiveMission()">미션 받기 <i class="fa-solid fa-arrow-right"></i></button>
    </div>
  </div>

  <div id="screen-mission" class="screen">
    <nav class="top-nav">
      <button class="nav-icon-btn" onclick="showScreen('screen-draw')"><i class="fa-solid fa-chevron-left"></i> 뒤로</button>
      <div class="nav-title" id="nav-station-title">- 체크리스트</div>
      <div style="width: 50px;"></div> 
    </nav>

    <div class="mission-card-mini" id="mission-mini-info">
    </div>

    <div class="checklist-container" style="width: 100%;">
      <ul class="mission-checklist" id="mission-checklist">
      </ul>
    </div>

    <div class="progress-bar-area">
      <p id="progress-text">진행률: 0 / 5 완료</p>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <button class="action-btn stamp-btn" id="stamp-btn" disabled onclick="claimStamp()">
      <i class="fa-solid fa-stamp"></i> 스탬프 받기!
    </button>
  </div>

  <div id="screen-stamp" class="screen">
    <canvas id="stamp-canvas"></canvas>
    
    <h2 class="stamp-header">🎉 스탬프 획득!</h2>

    <div class="stamp-card" id="stamp-card">
      <div class="stamp-visual">
        <i class="fa-solid fa-train-tram"></i>
        <div class="stamp-text">CLEARED</div>
      </div>
      
      <h2 class="stamp-station" id="stamp-station-name">-</h2>
      
      <div class="stamp-meta">
        <span class="rank-badge" id="stamp-rank">-</span>
        <span id="stamp-line">-</span>
      </div>
      
      <div class="stamp-divider"></div>
      <div class="stamp-date" id="stamp-date">2026.00.00</div>
      
      <div class="stamp-missions">
        <p style="font-weight:800; margin-bottom:10px; color:var(--text-main);">완료 미션:</p>
        <ul id="stamp-mission-list"></ul>
      </div>
      
      <div class="stamp-divider"></div>
      <div class="stamp-author" id="stamp-author">by. -</div>
    </div>

    <div class="result-actions" style="display:flex; justify-content:center; gap:15px; margin-top:25px;">
      <button class="action-btn retry-btn" onclick="alert('📸 사진첩에 저장되었습니다!')" style="width: auto; padding: 15px 30px;"><i class="fa-solid fa-camera"></i> 저장</button>
      <button class="action-btn collection-btn" onclick="openCollection()" style="width: auto; padding: 15px 30px;"><i class="fa-solid fa-book"></i> 컬렉션</button>
    </div>
  </div>

  <div id="screen-collection" class="screen" style="justify-content: flex-start; padding-top: 20px;">
    <nav class="top-nav" style="margin-bottom: 10px;">
      <button class="nav-icon-btn" onclick="location.reload()"><i class="fa-solid fa-house"></i> 아이두 홈</button>
      <div class="nav-title">내 여행 기록</div>
      <div style="width: 75px;"></div>
    </nav>

    <div class="collection-summary">
      <div style="font-size: 14px; color: var(--text-muted); font-weight: 700; margin-bottom: 5px;">달성률</div>
      <div style="font-size: 28px; font-weight: 900; color: var(--accent-color);" id="total-collection-rate">12 / 62 역</div>
      <div class="progress-track" style="height: 8px; margin: 15px 0 5px 0;">
        <div class="progress-fill" style="width: 20%;" id="total-progress-fill"></div>
      </div>
    </div>

    <div id="railway-container" style="width: 100%; padding-bottom: 40px;">
      </div>
  </div>

</div>

<script>
  // --- 상태 관리 변수 ---
  let userInfo = { nickname: "", startStation: "" };
  let selectedStation = null; 
  let remainingDraws = 5;
  const totalDraws = 5;

  // --- 화면 전환 공통 함수 ---
  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  // --- 데이터 세팅 ---
  const drawData = [
    { name: "정동진역", line: "강릉선 / 영동선", rank: "SSR", transfer: true },
    { name: "묵호역", line: "영동선", rank: "SR", transfer: false },
    { name: "분천역", line: "영동선 / 경북선", rank: "SSR", transfer: true },
    { name: "동해역", line: "강동선 / 영동선", rank: "SR", transfer: false }
  ];

  const missionData = {
    "정동진역": ["정동진역 승강장에서 바다 배경으로 사진 찍기", "모래시계 공원에서 세계 최대 모래시계 확인하기", "바다 열차가 지나갈 때 손 흔들어주기", "역 근처 초당순두부 아이스크림 맛보기", "정동진 레일바이크 타고 해안선 구경하기"],
    "묵호역": ["논골담길 벽화마을 가장 높은 곳까지 올라가기", "도째비골 스카이밸리에서 아찔한 인증샷 찍기", "묵호항 수변공원에서 바다 냄새 맡으며 산책하기", "주변 소품샵에서 물고기 모양 굿즈 찾기", "해랑전망대 끝에서 바다 한가운데 서 보기"],
    "분천역": ["산타 우체국에서 미래의 나에게 엽서 쓰기", "루돌프 썰매 조형물 위에 올라가 포즈 취하기", "분천역 먹거리 장터에서 수수부꾸미 먹기", "산타마을 마스코트 알파카에게 인사하기", "빨간색 지붕이 보이는 풍경 사진 찍기"],
    "동해역": ["동해역 앞 로컬 맛집에서 장칼국수 먹기", "한섬해변 테마길 산책하며 조형물 찾기", "동해선 기차 시간표 확인하고 사진 남기기", "역 광장에서 오늘 여행의 소감 영상 찍기", "주변 편의점에서 지역 특산 음료 마시기"]
  };

  const collectionData = [
    {
      lineName: "동해산타열차",
      stations: [
        { name: "강릉", unlocked: true },
        { name: "정동진", unlocked: true },
        { name: "묵호", unlocked: true },
        { name: "분천", unlocked: false }
      ]
    },
    {
      lineName: "경부선 (예시)",
      stations: [
        { name: "서울", unlocked: true },
        { name: "대전", unlocked: true },
        { name: "동대구", unlocked: false },
        { name: "부산", unlocked: false }
      ]
    }
  ];

  // --- 1. 시작하기 ---
  function startJourney() {
    const nicknameInput = document.getElementById('user-nickname').value.trim();
    const stationSelect = document.getElementById('start-station').value;

    if (!nicknameInput || !stationSelect) { alert("정보를 모두 입력해주세요!"); return; }

    userInfo.nickname = nicknameInput;
    userInfo.startStation = stationSelect;

    updateDrawButton();
    showScreen('screen-draw');
  }

  function updateDrawButton() {
    document.getElementById('draw-count-display').innerText = `(${remainingDraws}/${totalDraws}회)`;
  }

  // --- 2. 카드 뽑기 ---
  function drawCard() {
    if (remainingDraws <= 0) { alert("오늘의 뽑기 횟수를 모두 사용하셨습니다!"); return; }

    const cardInner = document.getElementById('card-inner');
    const drawBtnArea = document.getElementById('draw-controls');
    const actionArea = document.getElementById('result-actions');

    selectedStation = drawData[Math.floor(Math.random() * drawData.length)];
    
    document.getElementById('res-name').innerText = selectedStation.name;
    document.getElementById('res-line').innerText = selectedStation.line;
    document.getElementById('res-rank').innerText = selectedStation.rank;
    document.getElementById('res-transfer').style.display = selectedStation.transfer ? "block" : "none";
    document.getElementById('card-result').className = `card-face card-front ${selectedStation.rank.toLowerCase()}`;

    remainingDraws--;
    updateDrawButton();
    cardInner.style.animation = "shake 0.5s ease-in-out";
    
    setTimeout(() => {
      cardInner.classList.add('is-flipped');
      triggerSparkles();
      drawBtnArea.style.display = "none";
      actionArea.style.display = "flex";
    }, 500);
  }

  function resetCard() {
    const cardInner = document.getElementById('card-inner');
    document.getElementById('sparkle-canvas').getContext('2d').clearRect(0, 0, 400, 850);
    cardInner.classList.remove('is-flipped');
    cardInner.style.animation = "none";
    setTimeout(() => {
      document.getElementById('draw-controls').style.display = "block";
      document.getElementById('result-actions').style.display = "none";
    }, 300);
  }

  function triggerSparkles() {
    const canvas = document.getElementById('sparkle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;
    let particles = Array.from({length: 60}, () => ({
      x: canvas.width/2, y: canvas.height/2, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15-5,
      size: Math.random()*5+3, color: `hsl(${Math.random()*60+40},100%,70%)`, alpha: 1
    }));

    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let isAlive = false;
      particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.alpha-=0.015;
        if(p.alpha>0) {
          isAlive = true; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
          ctx.fillStyle = p.color.replace(')', `,${p.alpha})`).replace('hsl','hsla'); ctx.fill();
        }
      });
      if(isAlive) requestAnimationFrame(animate); else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    animate();
  }

  // --- 3. 미션 수행 ---
  function receiveMission() {
    if (!selectedStation) return;

    document.getElementById('nav-station-title').innerText = `${selectedStation.name} 체크리스트`;
    document.getElementById('mission-mini-info').innerHTML = `
      <div class="rank-badge" style="margin-bottom:10px">${selectedStation.rank}</div>
      <h3 style="margin:0; font-size: 20px; color: #3D3D3D;">${selectedStation.name}</h3>
      <p style="font-size:14px; color:#666; margin:5px 0">${selectedStation.line}</p>
    `;

    const listContainer = document.getElementById('mission-checklist');
    listContainer.innerHTML = '';
    const missions = missionData[selectedStation.name] || ["역 주변 탐방하기", "인증샷 찍기", "맛있는 것 먹기", "풍경 감상하기", "기념품 사기"];

    missions.forEach((m, i) => {
      const li = document.createElement('li');
      li.className = 'mission-item';
      li.innerHTML = `<input type="checkbox" id="m-${i}" onchange="updateProgress()"><label for="m-${i}">${m}</label>`;
      listContainer.appendChild(li);
    });

    updateProgress();
    showScreen('screen-mission');
  }

  function updateProgress() {
    const checkboxes = document.querySelectorAll('#mission-checklist input[type="checkbox"]');
    const checkedCount = Array.from(checkboxes).filter(c => c.checked).length;
    const total = checkboxes.length;

    document.getElementById('progress-text').innerText = `진행률: ${checkedCount} / ${total} 완료`;
    document.getElementById('progress-fill').style.width = `${(checkedCount / total) * 100}%`;

    checkboxes.forEach(c => {
      if (c.checked) c.parentElement.classList.add('completed');
      else c.parentElement.classList.remove('completed');
    });

    const stampBtn = document.getElementById('stamp-btn');
    if (checkedCount === total && total > 0) {
      stampBtn.disabled = false; stampBtn.classList.add('active');
    } else {
      stampBtn.disabled = true; stampBtn.classList.remove('active');
    }
  }

  // --- 4. 스탬프 획득 ---
  function claimStamp() {
    const today = new Date();
    const dateString = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

    document.getElementById('stamp-station-name').innerText = selectedStation.name;
    document.getElementById('stamp-rank').innerText = selectedStation.rank;
    document.getElementById('stamp-line').innerText = selectedStation.line;
    document.getElementById('stamp-date').innerText = dateString;
    document.getElementById('stamp-author').innerText = `by. ${userInfo.nickname}`;

    const missionList = document.getElementById('stamp-mission-list');
    missionList.innerHTML = '';
    const missions = missionData[selectedStation.name] || [];
    
    missions.slice(0, 3).forEach(m => { missionList.innerHTML += `<li><i class="fa-solid fa-square-check"></i> ${m}</li>`; });
    if(missions.length > 3) missionList.innerHTML += `<li style="color:#999; font-size:12px; margin-left:25px;">...외 ${missions.length - 3}개 미션 완료</li>`;

    showScreen('screen-stamp');
    triggerStampSparkles();
  }

  function triggerStampSparkles() {
    const canvas = document.getElementById('stamp-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;

    let particles = Array.from({length: 100}, () => ({
      x: canvas.width/2, y: canvas.height/2 + 50, vx: (Math.random()-0.5)*25, vy: (Math.random()-0.5)*25-8,
      size: Math.random()*6+4, color: `hsl(${Math.random()*360},100%,60%)`, alpha: 1
    }));

    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let isAlive = false;
      particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; p.alpha-=0.01;
        if(p.alpha>0) {
          isAlive = true; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
          ctx.fillStyle = p.color.replace(')', `,${p.alpha})`).replace('hsl','hsla'); ctx.fill();
        }
      });
      if(isAlive) requestAnimationFrame(animate); else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    animate();
  }

  // --- 5. 컬렉션 ---
  function openCollection() {
    renderRailway();
    showScreen('screen-collection');
  }

  function renderRailway() {
    const container = document.getElementById('railway-container');
    container.innerHTML = ''; 
    let totalStations = 0; let unlockedStations = 0;

    collectionData.forEach(line => {
      const section = document.createElement('div'); section.className = 'rail-section';
      const title = document.createElement('div'); title.className = 'rail-title'; title.innerText = line.lineName;
      section.appendChild(title);

      const trackContainer = document.createElement('div'); trackContainer.className = 'track-container';
      const trackLine = document.createElement('div'); trackLine.className = 'track-line';
      trackContainer.appendChild(trackLine);

      line.stations.forEach(station => {
        totalStations++; if (station.unlocked) unlockedStations++;
        const node = document.createElement('div'); node.className = `track-node ${station.unlocked ? 'unlocked' : ''}`;
        const iconHtml = station.unlocked ? '<i class="fa-solid fa-train"></i>' : '<i class="fa-solid fa-lock"></i>';
        
        node.innerHTML = `
          <div class="node-circle">${iconHtml}</div>
          <div class="node-name">${station.name}</div>
          ${!station.unlocked ? '<div style="font-size:10px; color:#ccc; margin-top:3px;">(잠금)</div>' : ''}
        `;
        if (station.unlocked) node.onclick = () => alert(`[${station.name}역] 스탬프 상세 보기 페이지로 이동합니다!`);
        trackContainer.appendChild(node);
      });

      section.appendChild(trackContainer); container.appendChild(section);
    });

    document.getElementById('total-collection-rate').innerText = `${unlockedStations} / ${totalStations} 역`;
    document.getElementById('total-progress-fill').style.width = `${(unlockedStations / totalStations) * 100}%`;
  }
</script>
