events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # 프론트엔드 정적 파일
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /login.html;
        }

        # API 프록시
        location /api/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SSE 스트리밍 전용 (proxy_buffering off)
        location ~ /api/v1/checklists/.*/generate {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
        }

        # 헬스 체크
        location /health {
            proxy_pass http://app:8000;
        }

        # 보안 헤더
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data:;" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
    }
}
